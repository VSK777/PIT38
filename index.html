<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT-38 Crypto Pro (Fixed Build)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: '-apple-system', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { text-align: center; color: #2c3e50; }
        .form-group { margin-top: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccd1d9; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #3498db; color: white; border: none; padding: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        button:disabled { background-color: #bdc3c7; }
        .alert-info { background: #fdf9f3; padding: 15px; border-radius: 8px; border-left: 5px solid #f39c12; margin: 20px 0; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        .pos { color: #2ecc71; font-weight: bold; }
        .neg { color: #e74c3c; font-weight: bold; }
        #debug-console { background: #2c3e50; color: #ecf0f1; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 11px; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Dziennik PIT-38 Krypto</h2>
    <div class="alert-info"><b>Статус:</b> <span id="status-text">Завантаження...</span></div>

    <div class="form-group"><label>Typ:</label><select id="type"><option value="KOSZT">KOSZT</option><option value="PRZYCHÓD">PRZYCHÓD</option></select></div>
    <div class="form-group"><label>Waluta:</label><select id="currency"><option value="USD">USD</option><option value="EUR">EUR</option><option value="PLN">PLN</option></select></div>
    <div class="form-group"><label>Kwota:</label><input type="number" id="amount" step="0.01"></div>
    <div class="form-group"><label>Data:</label><input type="date" id="date"></div>
    <button onclick="addTransaction()" id="addBtn">Dodaj transakcję</button>

    <h3 style="margin-top: 40px; color: #e67e22;">Podsumowanie roczne</h3>
    <table><thead><tr><th>Rok</th><th>Przychody</th><th>Koszty</th><th>DOCHÓD</th><th>Podatek</th></tr></thead><tbody id="yearly-summary-table"></tbody></table>

    <h3>Historia transakcji</h3>
    <table><thead><tr><th>Data</th><th>Typ</th><th>Kwota</th><th>Kurs</th><th>PLN</th></tr></thead><tbody id="history-table"></tbody></table>

    <div id="debug-console"><b>Лог діагностики:</b><div id="debug-log">Готово до роботи.</div></div>
</div>

<script>
    const SUPABASE_URL = 'https://sugtnffonquakbgkhqlf.supabase.co';
    const SUPABASE_KEY = 'Sb_publishable_vBJcrXbrBXA1QRuYDFcr4w_ctTZQ7py';
    
    let _supabase;
    const log = (msg) => { document.getElementById('debug-log').innerHTML += `<br>> ${msg}`; };

    const prefilledData = [
        { id: 'p1', date: '2023-12-31', type: 'PRZYCHÓD', currency: 'PLN', amount: 143301.90, rate: 1, plnValue: 143301.90 },
        { id: 'p2', date: '2023-12-31', type: 'KOSZT', currency: 'PLN', amount: 151672.70, rate: 1, plnValue: 151672.70 },
        { id: 'p3', date: '2024-12-31', type: 'KOSZT', currency: 'PLN', amount: 22944.37, rate: 1, plnValue: 22944.37 },
        { id: 'p4', date: '2025-12-31', type: 'PRZYCHÓD', currency: 'PLN', amount: 1185.30, rate: 1, plnValue: 1185.30 },
        { id: 'p5', date: '2025-12-31', type: 'KOSZT', currency: 'PLN', amount: 18425.91, rate: 1, plnValue: 18425.91 }
    ];

    let userHistory = JSON.parse(localStorage.getItem('backup_data')) || [];

    function updateUI() {
        try {
            const full = [...prefilledData, ...userHistory];
            const tbody = document.getElementById('yearly-summary-table');
            tbody.innerHTML = '';
            let map = {};
            
            full.forEach(t => {
                let y = t.date.substring(0, 4);
                let val = parseFloat(t.plnValue || t.pln_value || 0);
                if (!map[y]) map[y] = { i: 0, c: 0 };
                if (t.type === 'PRZYCHÓD') map[y].i += val; else map[y].c += val;
            });

            Object.keys(map).sort().forEach(y => {
                let res = map[y].i - map[y].c;
                tbody.innerHTML += `<tr><td>${y}</td><td>${map[y].i.toFixed(2)}</td><td>${map[y].c.toFixed(2)}</td><td class="${res<0?'neg':'pos'}">${res.toFixed(2)}</td><td>${res>0?(res*0.19).toFixed(2):0}</td></tr>`;
            });

            const hbody = document.getElementById('history-table');
            hbody.innerHTML = '';
            full.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
                let val = parseFloat(t.plnValue || t.pln_value || 0);
                hbody.innerHTML += `<tr><td>${t.date}</td><td>${t.type}</td><td>${t.amount} ${t.currency}</td><td>${t.rate || 1}</td><td>${val.toFixed(2)}</td></tr>`;
            });
        } catch (e) {
            log("Помилка візуалізації: " + e.message);
        }
    }

    async function initCloud() {
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            const { data, error } = await _supabase.from('transactions').select('*');
            if (error) throw error;
            if (data) {
                userHistory = data.map(t => ({ ...t, plnValue: t.pln_value }));
                localStorage.setItem('backup_data', JSON.stringify(userHistory));
                log("Дані синхронізовано з хмарою.");
            }
            document.getElementById('status-text').innerText = "Хмара підключена ✅";
        } catch (e) {
            log("Хмара недоступна: " + e.message);
            document.getElementById('status-text').innerText = "Локальний режим ⚠️";
        }
        updateUI();
    }

    async function getNBPRate(currency, dateStr) {
        if (currency === 'PLN') return { rate: 1.00, date: dateStr };
        let date = new Date(dateStr);
        for (let i = 0; i < 7; i++) {
            date.setDate(date.getDate() - 1);
            let checkDate = date.toISOString().split('T')[0];
            try {
                let r = await fetch(`https://api.nbp.pl/api/exchangerates/rates/a/${currency}/${checkDate}/?format=json`);
                if (r.ok) { let d = await r.json(); return { rate: d.rates[0].mid, date: checkDate }; }
            } catch (e) {}
        }
        return null;
    }

    async function addTransaction() {
        const amount = parseFloat(document.getElementById('amount').value);
        const dateVal = document.getElementById('date').value;
        const btn = document.getElementById('addBtn');
        if (!amount || !dateVal) return;

        btn.innerText = "Обробка..."; btn.disabled = true;

        try {
            const rateData = await getNBPRate(document.getElementById('currency').value, dateVal);
            if (!rateData) throw new Error("Курс NBP недоступний.");

            const plnVal = parseFloat((amount * rateData.rate).toFixed(2));
            const newEntry = {
                date: dateVal,
                nbp_date: rateData.date,
                type: document.getElementById('type').value,
                currency: document.getElementById('currency').value,
                amount: amount,
                rate: rateData.rate,
                plnValue: plnVal, // Для локального показу
                pln_value: plnVal // Для бази даних
            };

            userHistory.push(newEntry);
            localStorage.setItem('backup_data', JSON.stringify(userHistory));
            updateUI();

            if (_supabase) {
                const { error } = await _supabase.from('transactions').insert([{
                    date: newEntry.date,
                    nbp_date: newEntry.nbp_date,
                    type: newEntry.type,
                    currency: newEntry.currency,
                    amount: newEntry.amount,
                    rate: newEntry.rate,
                    pln_value: newEntry.pln_value
                }]);
                if (error) log("Хмарна помилка: " + error.message);
            }
            document.getElementById('amount').value = '';
        } catch (e) {
            alert("Помилка: " + e.message);
        } finally {
            btn.innerText = "Dodaj transakcję"; btn.disabled = false;
        }
    }

    window.onload = () => { updateUI(); initCloud(); };
</script>
</body>
</html>
