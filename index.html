<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT-38 Crypto Secure Sync</title>
    <link rel="apple-touch-icon" href="https://cryptologos.cc/logos/tether-usdt-logo.png">
    <style>
        body { font-family: '-apple-system', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Стилі логіна */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .sync-status { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #2c3e50; color: white; border-radius: 8px; margin-bottom: 20px; font-size: 12px; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2ecc71; }
        .offline { background-color: #e74c3c; }

        .btn-main { width: 100%; background-color: #3498db; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .btn-danger { background-color: #e74c3c; padding: 5px 8px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .pos { color: #2ecc71; font-weight: bold; }
        .neg { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<!-- ВІКНО ЛОГІНА -->
<div id="loginOverlay">
    <div class="login-box">
        <h3>🔐 Logowanie Cloud</h3>
        <p style="font-size: 12px; color: #7f8c8d;">Wprowadź dane ze swoich screenów</p>
        <input type="password" id="userToken" placeholder="GitHub Personal Token">
        <input type="text" id="userGistId" placeholder="Gist ID">
        <button onclick="login()" class="btn-main">Zaloguj i synchronizuj</button>
    </div>
</div>

<div class="container">
    <div class="sync-status">
        <div><span id="dot" class="status-dot offline"></span> <span id="statusText">Brak połączenia</span></div>
        <button onclick="logout()" style="background:none; border:1px solid #fff; color:#fff; font-size:10px; cursor:pointer; border-radius:4px;">Wyloguj</button>
    </div>

    <h2>Dziennik PIT-38 Krypto</h2>

    <div style="display: flex; gap: 5px; margin-top: 15px;">
        <select id="type" style="flex: 1; padding: 10px;"><option value="KOSZT">KOSZT</option><option value="PRZYCHÓD">PRZYCHÓD</option></select>
        <input type="number" id="amount" placeholder="Kwota" style="flex: 1; padding: 10px;">
        <input type="date" id="date" style="flex: 1; padding: 10px;">
        <button onclick="addTransaction()" id="addBtn" style="padding: 10px; background: #3498db; color: white; border: none; border-radius: 6px;">+</button>
    </div>

    <h3 style="margin-top: 30px;">Podsumowanie</h3>
    <table>
        <thead><tr><th>Rok</th><th>Dochód</th><th>Podatek</th></tr></thead>
        <tbody id="summaryBody"></tbody>
    </table>

    <h3 style="margin-top: 30px;">Historia</h3>
    <table>
        <tbody id="historyBody"></tbody>
    </table>
</div>

<script>
    const CONFIG_KEY = 'pit38_auth';
    const STORAGE_KEY = 'pit38_local_data';
    const GIST_FILENAME = 'gistfile1.txt';

    const prefilledData = [
        { id: 'p1', date: '2023-12-31', type: 'PRZYCHÓD', plnValue: 143301.90, prefilled: true },
        { id: 'p2', date: '2023-12-31', type: 'KOSZT', plnValue: 151672.70, prefilled: true },
        { id: 'p3', date: '2024-12-31', type: 'KOSZT', plnValue: 22944.37, prefilled: true }
    ];

    let userHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // --- АВТЕНТИФІКАЦІЯ ---

    function login() {
        const token = document.getElementById('userToken').value;
        const id = document.getElementById('userGistId').value;
        if (!token || !id) return alert("Wypełnij oba pola!");

        localStorage.setItem(CONFIG_KEY, JSON.stringify({ token, id }));
        document.getElementById('loginOverlay').style.display = 'none';
        sync('pull');
    }

    function logout() {
        if (confirm("Wylogować i wyczyścić dane logowania?")) {
            localStorage.removeItem(CONFIG_KEY);
            location.reload();
        }
    }

    function checkAuth() {
        const auth = JSON.parse(localStorage.getItem(CONFIG_KEY));
        if (auth) {
            document.getElementById('loginOverlay').style.display = 'none';
            sync('pull');
        }
    }

    // --- СИНХРОНІЗАЦІЯ ---

    async function sync(action = 'push') {
        const auth = JSON.parse(localStorage.getItem(CONFIG_KEY));
        if (!auth) return;

        const statusText = document.getElementById('statusText');
        const dot = document.getElementById('dot');

        try {
            statusText.innerText = "Sync...";
            if (action === 'push') {
                await fetch(`https://api.github.com/gists/${auth.id}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${auth.token}` },
                    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(userHistory) } } })
                });
            } else {
                const res = await fetch(`https://api.github.com/gists/${auth.id}`, {
                    headers: { 'Authorization': `token ${auth.token}` }
                });
                const data = await res.json();
                const content = data.files[GIST_FILENAME].content;
                userHistory = content === "[]" ? [] : JSON.parse(content);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
            }
            statusText.innerText = "Online";
            dot.className = "status-dot online";
        } catch (e) {
            statusText.innerText = "Błąd Cloud";
            dot.className = "status-dot offline";
        }
        updateUI();
    }

    // --- ЛОГІКА ДОДАТКУ ---

    async function addTransaction() {
        const amount = parseFloat(document.getElementById('amount').value);
        const dateVal = document.getElementById('date').value;
        if (!amount || !dateVal) return;

        userHistory.push({
            id: Date.now(), date: dateVal, type: document.getElementById('type').value,
            plnValue: amount 
        });

        localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
        await sync('push');
        document.getElementById('amount').value = '';
    }

    async function deleteTransaction(id) {
        userHistory = userHistory.filter(t => t.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
        await sync('push');
    }

    function updateUI() {
        const full = [...prefilledData, ...userHistory];
        const hBody = document.getElementById('historyBody');
        hBody.innerHTML = '';

        let years = {};
        full.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            hBody.innerHTML += `<tr>
                <td>${t.date}</td>
                <td class="${t.type==='KOSZT'?'neg':'pos'}">${t.type}</td>
                <td>${t.plnValue.toFixed(2)}</td>
                <td>${t.prefilled ? '-' : `<button class="btn-danger" onclick="deleteTransaction(${t.id})">X</button>`}</td>
            </tr>`;
            
            let y = t.date.substring(0,4);
            if(!years[y]) years[y] = { p:0, k:0 };
            if(t.type==='PRZYCHÓD') years[y].p += t.plnValue;
            else years[y].k += t.plnValue;
        });

        const sBody = document.getElementById('summaryBody');
        sBody.innerHTML = '';
        let lossCarry = 0;
        Object.keys(years).sort().forEach(y => {
            let res = years[y].p - years[y].k - lossCarry;
            let tax = res > 0 ? res * 0.19 : 0;
            sBody.innerHTML += `<tr><td>${y}</td><td class="${res<0?'neg':'pos'}">${res.toFixed(2)}</td><td>${tax.toFixed(2)}</td></tr>`;
            lossCarry = res < 0 ? Math.abs(res) : 0;
        });
    }

    window.onload = checkAuth;
</script>
</body>
</html>
