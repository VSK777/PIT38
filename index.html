<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT-38 Crypto Pro (Cloud Sync)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: '-apple-system', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .form-group { margin-top: 15px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccd1d9; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #3498db; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .btn-danger { background-color: #e74c3c; padding: 6px 10px; font-size: 11px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .alert-info { background: #fdf9f3; padding: 15px; border-radius: 8px; border-left: 5px solid #f39c12; margin: 20px 0; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .pos { color: #2ecc71; font-weight: bold; }
        .neg { color: #e74c3c; font-weight: bold; }
        .prefilled-tag { font-size: 9px; background: #95a5a6; color: white; padding: 2px 4px; border-radius: 3px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dziennik PIT-38 Krypto</h2>
    
    <div class="alert-info">
        <b>Хмарна синхронізація активована.</b> Дані до 2026 року збережені.
    </div>

    <div class="form-group">
        <label>Typ operacji:</label>
        <select id="type">
            <option value="KOSZT">KOSZT (Zakup / Wydatki)</option>
            <option value="PRZYCHÓD">PRZYCHÓD (Sprzedaż / Dochód)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Waluta:</label>
        <select id="currency">
            <option value="USD">USD (USDT / USDC)</option>
            <option value="EUR">EUR</option>
            <option value="PLN">PLN</option>
        </select>
    </div>

    <div class="form-group">
        <label>Kwota:</label>
        <input type="number" id="amount" placeholder="np. 500.00" step="0.01">
    </div>

    <div class="form-group">
        <label>Data transakcji:</label>
        <input type="date" id="date">
    </div>

    <button onclick="addTransaction()" id="addBtn">Dodaj transakcję</button>

    <h3 style="margin-top: 40px; color: #e67e22;">Podsumowanie roczne (PIT-38)</h3>
    <table>
        <thead>
            <tr>
                <th>Rok</th>
                <th>Przychody</th>
                <th>Koszty</th>
                <th>Koszty lat ub.</th>
                <th>DOCHÓD</th>
                <th>Podatek (19%)</th>
            </tr>
        </thead>
        <tbody id="yearly-summary-table"></tbody>
    </table>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 40px;">
        <h3 style="margin: 0; font-size: 18px;">Historia transakcji</h3>
        <select id="yearFilter" onchange="updateUI()" style="width: 140px;">
            <option value="all">Wszystkie lata</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>Data</th>
                <th>Typ</th>
                <th>Kwota</th>
                <th>Kurs NBP</th>
                <th>Wartość (PLN)</th>
                <th>Akcja</th>
            </tr>
        </thead>
        <tbody id="history-table"></tbody>
    </table>
</div>

<script>
    // КОНФІГУРАЦІЯ
    const SUPABASE_URL = 'https://sugtnffonquakbgkhqlf.supabase.co';
    const SUPABASE_KEY = 'Sb_publishable_vBJcrXbrBXA1QRuYDFcr4w_ctTZQ7py'; 
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Твої збережені дані до 2026 року
    const prefilledData = [
        { id: 'p1', date: '2023-12-31', type: 'PRZYCHÓD', currency: 'PLN', amount: 143301.90, rate: 1, plnValue: 143301.90, prefilled: true },
        { id: 'p2', date: '2023-12-31', type: 'KOSZT', currency: 'PLN', amount: 151672.70, rate: 1, plnValue: 151672.70, prefilled: true },
        { id: 'p3', date: '2024-12-31', type: 'KOSZT', currency: 'PLN', amount: 22944.37, rate: 1, plnValue: 22944.37, prefilled: true },
        { id: 'p4', date: '2025-12-31', type: 'PRZYCHÓD', currency: 'PLN', amount: 1185.30, rate: 1, plnValue: 1185.30, prefilled: true },
        { id: 'p5', date: '2025-12-31', type: 'KOSZT', currency: 'PLN', amount: 18425.91, rate: 1, plnValue: 18425.91, prefilled: true }
    ];

    let userHistory = [];

    async function loadData() {
        try {
            const { data, error } = await _supabase.from('transactions').select('*');
            if (error) throw error;
            userHistory = data.map(t => ({ ...t, plnValue: t.pln_value }));
            updateUI();
        } catch (e) {
            console.error("Помилка завантаження:", e.message);
        }
    }

    async function getNBPRate(currency, dateStr) {
        if (currency === 'PLN') return { rate: 1.00, date: dateStr };
        let date = new Date(dateStr);
        for (let i = 0; i < 7; i++) {
            date.setDate(date.getDate() - 1);
            let checkDate = date.toISOString().split('T')[0];
            let url = `https://api.nbp.pl/api/exchangerates/rates/a/${currency}/${checkDate}/?format=json`;
            try {
                let response = await fetch(url);
                if (response.ok) {
                    let data = await response.json();
                    return { rate: data.rates[0].mid, date: checkDate };
                }
            } catch (e) {}
        }
        return null;
    }

    async function addTransaction() {
        const amount = parseFloat(document.getElementById('amount').value);
        const dateVal = document.getElementById('date').value;
        const currency = document.getElementById('currency').value;
        const type = document.getElementById('type').value;
        const btn = document.getElementById('addBtn');

        if (!amount || !dateVal) return;
        btn.innerText = "Зберігаю..."; btn.disabled = true;

        try {
            const rateData = await getNBPRate(currency, dateVal);
            if (!rateData) throw new Error("Не вдалося отримати курс NBP.");

            const { error } = await _supabase.from('transactions').insert([{
                date: dateVal, nbp_date: rateData.date, type: type,
                currency: currency, amount: amount, rate: rateData.rate,
                pln_value: parseFloat((amount * rateData.rate).toFixed(2))
            }]);
            
            if (error) throw error;
            await loadData();
            document.getElementById('amount').value = '';
            alert("Успішно збережено!");
        } catch (e) {
            alert("Помилка: " + e.message + "\n\nШвидше за все, ключ АПІ неповний. Скопіюй його кнопкою Copy у Supabase!");
        } finally {
            btn.innerText = "Dodaj transakcję"; btn.disabled = false;
        }
    }

    async function deleteTransaction(id) {
        if (confirm("Видалити запис?")) {
            const { error } = await _supabase.from('transactions').delete().eq('id', id);
            if (!error) await loadData();
        }
    }

    function updateUI() {
        const fullHistory = [...prefilledData, ...userHistory];
        const yearFilter = document.getElementById('yearFilter');
        const currentYear = yearFilter.value;
        const years = [...new Set(fullHistory.map(t => t.date.substring(0, 4)))].sort();
        
        yearFilter.innerHTML = '<option value="all">Wszystkie lata</option>';
        years.forEach(y => { yearFilter.innerHTML += `<option value="${y}">${y}</option>`; });
        yearFilter.value = currentYear;

        const summaryTbody = document.getElementById('yearly-summary-table');
        summaryTbody.innerHTML = '';
        let yearsMap = {};
        fullHistory.forEach(t => {
            let y = t.date.substring(0, 4);
            if (!yearsMap[y]) yearsMap[y] = { income: 0, cost: 0 };
            if (t.type === 'PRZYCHÓD') yearsMap[y].income += t.plnValue;
            if (t.type === 'KOSZT') yearsMap[y].cost += t.plnValue;
        });

        Object.keys(yearsMap).sort().forEach(year => {
            let p = yearsMap[year].income;
            let k = yearsMap[year].cost;
            let result = p - k;
            let tax = result > 0 ? (result * 0.19) : 0;
            summaryTbody.innerHTML += `
                <tr>
                    <td><b>${year}</b></td>
                    <td>${p.toFixed(2)}</td>
                    <td>${k.toFixed(2)}</td>
                    <td>-</td>
                    <td class="${result < 0 ? 'neg' : 'pos'}">${result.toFixed(2)}</td>
                    <td>${tax.toFixed(2)}</td>
                </tr>
            `;
        });

        const historyTbody = document.getElementById('history-table');
        historyTbody.innerHTML = '';
        const filter = yearFilter.value;
        const filtered = filter === 'all' ? fullHistory : fullHistory.filter(t => t.date.startsWith(filter));

        filtered.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            historyTbody.innerHTML += `
                <tr>
                    <td>${t.date} ${t.prefilled ? '<span class="prefilled-tag">AUTO</span>' : ''}</td>
                    <td class="${t.type === 'PRZYCHÓD' ? 'pos' : 'neg'}">${t.type}</td>
                    <td>${t.amount} ${t.currency}</td>
                    <td>${t.rate === 1 ? '-' : t.rate}</td>
                    <td><b>${t.plnValue.toFixed(2)}</b></td>
                    <td>${t.prefilled ? '-' : `<button class="btn-danger" onclick="deleteTransaction(${t.id})">Usuń</button>`}</td>
                </tr>
            `;
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
