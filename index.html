<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT-38 Crypto Pro</title>
    
    <link rel="apple-touch-icon" href="https://cryptologos.cc/logos/tether-usdt-logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { font-family: '-apple-system', sans-serif; padding: 10px; background-color: #f4f7f6; color: #333; margin: 0; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .form-group { flex: 1; min-width: 140px; }
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccd1d9; font-size: 16px; box-sizing: border-box; }
        
        .btn-main { width: 100%; background-color: #3498db; color: white; border: none; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 10px 0; }
        .btn-danger { background-color: #e74c3c; padding: 8px 12px; font-size: 12px; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        .backup-section { display: flex; gap: 8px; margin: 15px 0; padding: 12px; background: #f8f9fa; border-radius: 10px; border: 1px dashed #ccd1d9; }
        .btn-secondary { flex: 1; background-color: #7f8c8d; color: white; border: none; padding: 12px; font-size: 12px; border-radius: 8px; cursor: pointer; }

        .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-top: 15px; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 700px; }
        th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #f2f2f2; font-size: 13px; }
        th { background-color: #fcfcfc; font-weight: 700; color: #7f8c8d; text-transform: uppercase; font-size: 11px; }
        
        .pos { color: #2ecc71; font-weight: bold; }
        .neg { color: #e74c3c; font-weight: bold; }

        @media (max-width: 600px) {
            .form-group { min-width: 100%; }
            .container { border-radius: 0; padding: 15px; }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>PIT-38 Crypto Pro</h2>
    
    <div class="form-row">
        <div class="form-group">
            <label>Typ:</label>
            <select id="type">
                <option value="KOSZT">KOSZT (Wydatki)</option>
                <option value="PRZYCHÓD">PRZYCHÓD (Sprzedaż)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Waluta:</label>
            <select id="currency">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="PLN">PLN</option>
            </select>
        </div>
        <div class="form-group">
            <label>Kwota:</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
            <label>Data:</label>
            <input type="date" id="date">
        </div>
    </div>

    <button onclick="addTransaction()" id="addBtn" class="btn-main">Dodaj transakcję</button>

    <div class="backup-section">
        <button onclick="exportData()" class="btn-secondary">📤 Eksportuj (iCloud)</button>
        <button onclick="document.getElementById('importFile').click()" class="btn-secondary">📥 Importuj (iCloud)</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <h3>Podsumowanie roczne (PIT-38)</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Rok</th>
                    <th>Przychody</th>
                    <th>Koszty</th>
                    <th style="color: #e67e22;">Koszty lat ub.</th>
                    <th>DOCHÓD</th>
                    <th>Podatek (19%)</th>
                </tr>
            </thead>
            <tbody id="yearly-summary-table"></tbody>
        </table>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 30px;">
        <h3 style="margin: 0;">Historia</h3>
        <select id="yearFilter" onchange="updateUI()" style="width: 130px; font-size: 12px; padding: 6px;"></select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Typ</th>
                    <th>Kwota</th>
                    <th>Kurs NBP</th>
                    <th>Wartość (PLN)</th>
                    <th>Akcja</th>
                </tr>
            </thead>
            <tbody id="history-table"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'pit38_v5_final_responsive';
    let userHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    async function getNBPRate(currency, dateStr) {
        if (currency === 'PLN') return { rate: 1.00 };
        let date = new Date(dateStr);
        for (let i = 0; i < 7; i++) {
            date.setDate(date.getDate() - 1);
            let checkDate = date.toISOString().split('T')[0];
            let url = `https://api.nbp.pl/api/exchangerates/rates/a/${currency}/${checkDate}/?format=json`;
            try {
                let response = await fetch(url);
                if (response.ok) {
                    let data = await response.json();
                    return { rate: data.rates[0].mid };
                }
            } catch (e) {}
        }
        return null;
    }

    async function addTransaction() {
        const amount = parseFloat(document.getElementById('amount').value);
        const dateVal = document.getElementById('date').value;
        const currency = document.getElementById('currency').value;
        const type = document.getElementById('type').value;
        if (!amount || !dateVal) return;

        const btn = document.getElementById('addBtn');
        btn.innerText = "Pobieram курс..."; btn.disabled = true;
        
        const rateData = await getNBPRate(currency, dateVal);
        
        if (rateData) {
            userHistory.push({
                id: "id_" + Date.now(),
                date: dateVal,
                type: type,
                currency: currency,
                amount: amount,
                rate: rateData.rate,
                plnValue: parseFloat((amount * rateData.rate).toFixed(2))
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
            updateUI();
            document.getElementById('amount').value = '';
        }
        btn.innerText = "Dodaj transakcję"; btn.disabled = false;
    }

    function deleteTransaction(id) {
        if (confirm("Usunąć tę transakcję?")) {
            userHistory = userHistory.filter(t => t.id != id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
            updateUI();
        }
    }

    function exportData() {
        const dataStr = JSON.stringify(userHistory, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `pit38_data_${new Date().toISOString().split('T')[0]}.json`;
        link.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    if (confirm("Zaimprować dane? (Duplikaty zostaną pominięte)")) {
                        const existingIds = userHistory.map(t => String(t.id));
                        const newEntries = imported.filter(t => !existingIds.includes(String(t.id)));
                        userHistory = [...userHistory, ...newEntries];
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
                        updateUI();
                    }
                }
            } catch (err) { alert("Błąd formatu pliku."); }
        };
        reader.readAsText(file);
    }

    function updateUI() {
        const summaryTbody = document.getElementById('yearly-summary-table');
        summaryTbody.innerHTML = '';
        
        let yearsMap = {};
        userHistory.forEach(t => {
            let y = t.date.substring(0, 4);
            if (!yearsMap[y]) yearsMap[y] = { income: 0, cost: 0 };
            if (t.type === 'PRZYCHÓD') yearsMap[y].income += t.plnValue;
            else yearsMap[y].cost += t.plnValue;
        });

        let sortedYears = Object.keys(yearsMap).sort();
        let cumulativeLoss = 0; // Накопичений збиток (Koszty lat ub.)

        sortedYears.forEach(year => {
            let p = yearsMap[year].income;
            let k = yearsMap[year].cost;
            let result = p - k - cumulativeLoss;
            let tax = result > 0 ? (result * 0.19) : 0;
            
            summaryTbody.innerHTML += `
                <tr>
                    <td><b>${year}</b></td>
                    <td>${p.toFixed(2)}</td>
                    <td>${k.toFixed(2)}</td>
                    <td style="color: #e67e22;">${cumulativeLoss.toFixed(2)}</td>
                    <td class="${result < 0 ? 'neg' : 'pos'}">${result.toFixed(2)}</td>
                    <td>${tax.toFixed(2)}</td>
                </tr>
            `;
            // Якщо результат від'ємний, він стає базою для Koszty lat ub. наступного року
            cumulativeLoss = result < 0 ? Math.abs(result) : 0;
        });

        const filterSelect = document.getElementById('yearFilter');
        const currentFilter = filterSelect.value || 'all';
        filterSelect.innerHTML = '<option value="all">Wszystkie lata</option>';
        sortedYears.forEach(y => filterSelect.innerHTML += `<option value="${y}" ${y === currentFilter ? 'selected' : ''}>${y}</option>`);

        const historyTbody = document.getElementById('history-table');
        historyTbody.innerHTML = '';
        const filtered = currentFilter === 'all' ? userHistory : userHistory.filter(t => t.date.startsWith(currentFilter));
        
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            historyTbody.innerHTML += `
                <tr>
                    <td>${t.date}</td>
                    <td class="${t.type === 'PRZYCHÓD' ? 'pos' : 'neg'}">${t.type}</td>
                    <td>${t.amount} ${t.currency}</td>
                    <td>${t.rate.toFixed(4)}</td>
                    <td><b>${t.plnValue.toFixed(2)}</b></td>
                    <td><button class="btn-danger" onclick="deleteTransaction('${t.id}')">Usuń</button></td>
                </tr>
            `;
        });
    }

    window.onload = updateUI;
</script>
</body>
</html>
