<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT-38 Crypto Pro (Cloud)</title>
    <link rel="apple-touch-icon" href="https://cryptologos.cc/logos/tether-usdt-logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: '-apple-system', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2, h3 { text-align: center; color: #2c3e50; }
        .form-group { margin-top: 15px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccd1d9; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #3498db; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .pos { color: #2ecc71; font-weight: bold; }
        .neg { color: #e74c3c; font-weight: bold; }
        .loading-status { text-align: center; font-size: 12px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dziennik PIT-38 (Sync)</h2>
    <div id="status" class="loading-status">Synchronizacja z Google Sheets...</div>

    <div class="form-group">
        <label>Typ operacji:</label>
        <select id="type">
            <option value="KOSZT">KOSZT</option>
            <option value="PRZYCHÓD">PRZYCHÓD</option>
        </select>
    </div>

    <div class="form-group">
        <label>Waluta / Kwota / Data:</label>
        <div style="display: flex; gap: 10px;">
            <select id="currency" style="flex: 1;"><option value="USD">USD</option><option value="EUR">EUR</option><option value="PLN">PLN</option></select>
            <input type="number" id="amount" style="flex: 2;" placeholder="0.00">
            <input type="date" id="date" style="flex: 2;">
        </div>
    </div>

    <button onclick="addTransaction()" id="addBtn">Dodaj i Zapisz w Chmurze</button>

    <h3>Podsumowanie PIT-38</h3>
    <table>
        <thead><tr><th>Rok</th><th>Przychody</th><th>Koszty</th><th>Dochód</th></tr></thead>
        <tbody id="summary-table"></tbody>
    </table>

    <h3>Ostatnie transakcje</h3>
    <table>
        <thead><tr><th>Data</th><th>Typ</th><th>Kwota</th><th>PLN</th></tr></thead>
        <tbody id="history-table"></tbody>
    </table>
</div>

<script>
    // --- ВСТАВТЕ ВАШЕ ПОСИЛАННЯ ТУТ ---
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbwyjlnwqcDYoqn8t4x2RdmmoYPDfvKcSoXhd_XQQurv7qrtyiH-lgNWpL02G9hX7hLL/exec";
    
    let userHistory = [];

    async function loadData() {
        try {
            const response = await fetch(CLOUD_URL);
            userHistory = await response.json();
            document.getElementById('status').innerText = "Dane zsynchronizowane ✅";
            updateUI();
        } catch (e) {
            document.getElementById('status').innerText = "Błąd synchronizacji ❌ (Tryb Offline)";
        }
    }

    async function addTransaction() {
        const btn = document.getElementById('addBtn');
        const amount = parseFloat(document.getElementById('amount').value);
        const date = document.getElementById('date').value;
        const currency = document.getElementById('currency').value;
        const type = document.getElementById('type').value;

        if (!amount || !date) return alert("Wypełnij wszystkie pola!");

        btn.disabled = true; btn.innerText = "Zapisywanie...";

        // Отримання курсу NBP
        let rate = 1;
        if (currency !== 'PLN') {
            const nbpResp = await fetch(`https://api.nbp.pl/api/exchangerates/rates/a/${currency}/${date}/?format=json`).catch(()=>null);
            if (nbpResp && nbpResp.ok) {
                const nbpData = await nbpResp.json();
                rate = nbpData.rates[0].mid;
            } else {
                rate = 4.25; // Приблизний курс якщо NBP недоступний
            }
        }

        const newTx = {
            date: date,
            type: type,
            currency: currency,
            amount: amount,
            rate: rate,
            plnValue: parseFloat((amount * rate).toFixed(2))
        };

        // Відправка в Google Sheets
        await fetch(CLOUD_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(newTx)
        });

        userHistory.push(newTx);
        updateUI();
        btn.disabled = false; btn.innerText = "Dodaj i Zapisz w Chmurze";
    }

    function updateUI() {
        const summaryTbody = document.getElementById('summary-table');
        const historyTbody = document.getElementById('history-table');
        summaryTbody.innerHTML = ''; historyTbody.innerHTML = '';

        let yearsMap = {};
        userHistory.forEach(t => {
            let y = t.date.substring(0, 4);
            if (!yearsMap[y]) yearsMap[y] = { p: 0, k: 0 };
            if (t.type === 'PRZYCHÓD') yearsMap[y].p += t.plnValue;
            else yearsMap[y].k += t.plnValue;
        });

        Object.keys(yearsMap).sort().forEach(y => {
            let res = yearsMap[y].p - yearsMap[y].k;
            summaryTbody.innerHTML += `<tr><td>${y}</td><td>${yearsMap[y].p.toFixed(2)}</td><td>${yearsMap[y].k.toFixed(2)}</td><td class="${res<0?'neg':'pos'}">${res.toFixed(2)}</td></tr>`;
        });

        userHistory.slice().reverse().forEach(t => {
            historyTbody.innerHTML += `<tr><td>${t.date}</td><td class="${t.type==='PRZYCHÓD'?'pos':'neg'}">${t.type}</td><td>${t.amount} ${t.currency}</td><td>${t.plnValue}</td></tr>`;
        });
    }

    window.onload = loadData;
</script>
</body>
</html>
