<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIT-38 Crypto Pro Cloud</title>
    
    <!-- Налаштування для iPad (Іконка та App-режим) -->
    <link rel="apple-touch-icon" href="https://cryptologos.cc/logos/tether-usdt-logo.png">
    <meta name="apple-mobile-web-app-title" content="PIT-38">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { font-family: '-apple-system', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Login Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 62, 80, 0.98); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 340px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* Status Bar */
        .sync-status { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: #2c3e50; color: white; border-radius: 8px; margin-bottom: 20px; font-size: 11px; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2ecc71; }
        .offline { background-color: #e74c3c; }

        h2, h3 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .form-group { margin-top: 15px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        select, input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccd1d9; box-sizing: border-box; font-size: 16px; }
        
        .btn-main { width: 100%; background-color: #3498db; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        .btn-main:disabled { background-color: #bdc3c7; }
        .btn-danger { background-color: #e74c3c; padding: 6px 10px; font-size: 11px; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        .alert-info { background: #fdf9f3; padding: 15px; border-radius: 8px; border-left: 5px solid #f39c12; margin: 20px 0; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th, td { padding: 10px; text-align: center; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        .pos { color: #2ecc71; font-weight: bold; }
        .neg { color: #e74c3c; font-weight: bold; }
        .prefilled-tag { font-size: 9px; background: #95a5a6; color: white; padding: 2px 4px; border-radius: 3px; vertical-align: middle; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>🔐 Synchronizacja Cloud</h3>
        <p style="font-size: 12px; color: #7f8c8d;">Zaloguj się, aby uzyskać dostęp do danych na iPadzie.</p>
        <input type="password" id="userToken" placeholder="GitHub Token (ghp_...)">
        <input type="text" id="userGistId" placeholder="Gist ID">
        <button onclick="login()" class="btn-main">Zaloguj i połącz</button>
    </div>
</div>

<div class="container">
    <div class="sync-status">
        <div><span id="dot" class="status-dot offline"></span> <span id="statusText">Brak połączenia</span></div>
        <div>
            <span id="lastSync" style="margin-right: 10px; opacity: 0.7;"></span>
            <button onclick="logout()" style="background:none; border:1px solid #fff; color:#fff; font-size:9px; cursor:pointer; border-radius:4px; padding: 2px 5px;">Wyloguj</button>
        </div>
    </div>

    <h2>Dziennik PIT-38 Krypto</h2>
    
    <div class="alert-info">
        Dane <b>2023-2025</b> są wbudowane. Nowe dane są w Twoim Gist.
    </div>

    <div class="form-group">
        <label>Typ operacji:</label>
        <select id="type">
            <option value="KOSZT">KOSZT (Zakup / Wydatki)</option>
            <option value="PRZYCHÓD">PRZYCHÓD (Sprzedaż / Dochód)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Waluta:</label>
        <select id="currency">
            <option value="USD">USD (USDT / USDC)</option>
            <option value="EUR">EUR</option>
            <option value="PLN">PLN</option>
        </select>
    </div>

    <div class="form-group">
        <label>Kwota:</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01">
    </div>

    <div class="form-group">
        <label>Data transakcji:</label>
        <input type="date" id="date">
    </div>

    <button onclick="addTransaction()" id="addBtn" class="btn-main">Dodaj transakcję</button>

    <h3 style="margin-top: 40px; color: #e67e22;">Podsumowanie roczne</h3>
    <table>
        <thead>
            <tr><th>Rok</th><th>Przychody</th><th>Koszty</th><th>Koszty lat ub.</th><th>DOCHÓD</th><th>Podatek</th></tr>
        </thead>
        <tbody id="yearly-summary-table"></tbody>
    </table>

    <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 40px;">
        <h3 style="margin: 0; font-size: 18px;">Historia</h3>
        <select id="yearFilter" onchange="updateUI()" style="width: 140px; font-size: 12px;"></select>
    </div>

    <table>
        <thead>
            <tr><th>Data</th><th>Typ</th><th>Kwota</th><th>Kurs</th><th>PLN</th><th>Akcja</th></tr>
        </thead>
        <tbody id="history-table"></tbody>
    </table>
</div>

<script>
    const CONFIG_KEY = 'pit38_auth_v5';
    const STORAGE_KEY = 'pit38_cloud_data_v5';
    const GIST_FILENAME = 'gistfile1.txt';

    const prefilledData = [
        { id: 'p1', date: '2023-12-31', type: 'PRZYCHÓD', currency: 'PLN', amount: 143301.90, rate: 1, plnValue: 143301.90, prefilled: true },
        { id: 'p2', date: '2023-12-31', type: 'KOSZT', currency: 'PLN', amount: 151672.70, rate: 1, plnValue: 151672.70, prefilled: true },
        { id: 'p3', date: '2024-12-31', type: 'KOSZT', currency: 'PLN', amount: 22944.37, rate: 1, plnValue: 22944.37, prefilled: true },
        { id: 'p4', date: '2025-12-31', type: 'PRZYCHÓD', currency: 'PLN', amount: 1185.30, rate: 1, plnValue: 1185.30, prefilled: true },
        { id: 'p5', date: '2025-12-31', type: 'KOSZT', currency: 'PLN', amount: 18425.91, rate: 1, plnValue: 18425.91, prefilled: true }
    ];

    let userHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    function login() {
        const token = document.getElementById('userToken').value;
        const id = document.getElementById('userGistId').value;
        if (!token || !id) return alert("Wprowadź dane!");
        localStorage.setItem(CONFIG_KEY, JSON.stringify({ token, id }));
        document.getElementById('loginOverlay').style.display = 'none';
        sync('pull');
    }

    function logout() {
        if (confirm("Wylogować?")) {
            localStorage.removeItem(CONFIG_KEY);
            location.reload();
        }
    }

    async function sync(action = 'push') {
        const auth = JSON.parse(localStorage.getItem(CONFIG_KEY));
        if (!auth) return;
        const statusText = document.getElementById('statusText');
        const dot = document.getElementById('dot');
        try {
            statusText.innerText = "Sync...";
            if (action === 'push') {
                await fetch(`https://api.github.com/gists/${auth.id}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${auth.token}` },
                    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(userHistory) } } })
                });
            } else {
                const res = await fetch(`https://api.github.com/gists/${auth.id}`, {
                    headers: { 'Authorization': `token ${auth.token}` }
                });
                const data = await res.json();
                const content = data.files[GIST_FILENAME].content;
                userHistory = content === "[]" || !content ? [] : JSON.parse(content);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
            }
            statusText.innerText = "Online";
            dot.className = "status-dot online";
            document.getElementById('lastSync').innerText = new Date().toLocaleTimeString();
        } catch (e) {
            statusText.innerText = "Błąd Cloud";
            dot.className = "status-dot offline";
        }
        updateUI();
    }

    async function getNBPRate(currency, dateStr) {
        if (currency === 'PLN') return { rate: 1.00, date: dateStr };
        let date = new Date(dateStr);
        for (let i = 0; i < 7; i++) {
            date.setDate(date.getDate() - 1);
            let checkDate = date.toISOString().split('T')[0];
            let url = `https://api.nbp.pl/api/exchangerates/rates/a/${currency}/${checkDate}/?format=json`;
            try {
                let response = await fetch(url);
                if (response.ok) {
                    let data = await response.json();
                    return { rate: data.rates[0].mid, date: checkDate };
                }
            } catch (e) {}
        }
        return null;
    }

    async function addTransaction() {
        const amount = parseFloat(document.getElementById('amount').value);
        const dateVal = document.getElementById('date').value;
        const currency = document.getElementById('currency').value;
        const type = document.getElementById('type').value;
        const btn = document.getElementById('addBtn');
        if (!amount || !dateVal) return;
        btn.innerText = "NBP..."; btn.disabled = true;
        const rateData = await getNBPRate(currency, dateVal);
        if (rateData) {
            userHistory.push({
                id: Date.now(), date: dateVal, type, currency, amount, rate: rateData.rate, 
                plnValue: parseFloat((amount * rateData.rate).toFixed(2)), prefilled: false
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
            await sync('push');
            document.getElementById('amount').value = '';
        }
        btn.innerText = "Dodaj transakcję"; btn.disabled = false;
    }

    async function deleteTransaction(id) {
        if (confirm("Usunąć?")) {
            userHistory = userHistory.filter(t => t.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userHistory));
            await sync('push');
        }
    }

    function updateUI() {
        const history = [...prefilledData, ...userHistory];
        const summaryTbody = document.getElementById('yearly-summary-table');
        summaryTbody.innerHTML = '';
        let yearsMap = {};
        history.forEach(t => {
            let y = t.date.substring(0, 4);
            if (!yearsMap[y]) yearsMap[y] = { income: 0, cost: 0 };
            if (t.type === 'PRZYCHÓD') yearsMap[y].income += t.plnValue;
            else yearsMap[y].cost += t.plnValue;
        });
        let sortedYears = Object.keys(yearsMap).sort();
        let lossCF = 0;
        sortedYears.forEach(year => {
            let p = yearsMap[year].income, k = yearsMap[year].cost;
            let result = p - k - lossCF;
            let tax = result > 0 ? (result * 0.19) : 0;
            summaryTbody.innerHTML += `<tr><td><b>${year}</b></td><td>${p.toFixed(2)}</td><td>${k.toFixed(2)}</td><td>${lossCF.toFixed(2)}</td><td class="${result < 0 ? 'neg' : 'pos'}">${result.toFixed(2)}</td><td>${tax.toFixed(2)}</td></tr>`;
            lossCF = result < 0 ? Math.abs(result) : 0;
        });
        const filterSelect = document.getElementById('yearFilter');
        const currentFilter = filterSelect.value || 'all';
        filterSelect.innerHTML = '<option value="all">Wszystkie lata</option>';
        sortedYears.forEach(y => filterSelect.innerHTML += `<option value="${y}" ${y === currentFilter ? 'selected' : ''}>${y}</option>`);
        const historyTbody = document.getElementById('history-table');
        historyTbody.innerHTML = '';
        const filtered = currentFilter === 'all' ? history : history.filter(t => t.date.startsWith(currentFilter));
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(t => {
            historyTbody.innerHTML += `<tr><td>${t.date} ${t.prefilled ? '<span class="prefilled-tag">AUTO</span>' : ''}</td><td class="${t.type === 'PRZYCHÓD' ? 'pos' : 'neg'}">${t.type}</td><td>${t.amount} ${t.currency}</td><td>${t.rate === 1 ? '-' : t.rate}</td><td><b>${t.plnValue.toFixed(2)}</b></td><td>${t.prefilled ? '-' : `<button class="btn-danger" onclick="deleteTransaction(${t.id})">Usuń</button>`}</td></tr>`;
        });
    }

    window.onload = () => {
        const auth = JSON.parse(localStorage.getItem(CONFIG_KEY));
        if (auth) { document.getElementById('loginOverlay').style.display = 'none'; sync('pull'); }
        updateUI();
    };
</script>
</body>
</html>
